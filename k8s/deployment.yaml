apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-monitor-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uptime-monitor-backend
  template:
    metadata:
      labels:
        app: uptime-monitor-backend
    spec:
      containers:
      - name: backend
        image: uptime-monitor-backend:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-monitor-backend-svc
spec:
  selector:
    app: uptime-monitor-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-monitor-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uptime-monitor-frontend
  template:
    metadata:
      labels:
        app: uptime-monitor-frontend
    spec:
      containers:
      - name: frontend
        image: uptime-monitor-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-monitor-frontend-svc
spec:
  selector:
    app: uptime-monitor-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
